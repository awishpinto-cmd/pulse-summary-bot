name: Run Pulse Daily

on:
  schedule:
    # Runs at 00:30 UTC (6:00 AM IST) every single day
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the bot anytime via GitHub UI

# Give the workflow token write access to push changes back to the repo
permissions:
  contents: write

jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Pulse Summary Bot
      run: python bot.py

    - name: Upload Daily Summary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-summary-artifact
        path: daily_summary.txt

    - name: Execute News Scraper and Send Email
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      run: python news_bot.py

    # NEW STEP: Compile live projects data metadata
    - name: Run Repo Fetcher Script
      run: python fetch_repos.py

    # NEW STEP: Commit the generated JSON structure back into your repository branch automatically
    - name: Commit and Push Updated Projects JSON
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add projects.json
        git commit -m "chore: automated refresh of projects.json [skip ci]" || exit 0
        git push
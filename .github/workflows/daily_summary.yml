name: Run Pulse Daily

on:
  schedule:
    # Runs at 00:30 UTC (6:00 AM IST) every single day
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the bot anytime via GitHub UI

jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone repository code onto the runner server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up the Python runtime environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install dependencies specified in requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run the automation script
    - name: Execute Bot
      run: python bot.py

    # Step 5: Save generated file as a downloadable workflow artifact
    - name: Upload Daily Summary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-summary-artifact
        path: daily_summary.txt

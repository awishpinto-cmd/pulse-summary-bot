name: Run Pulse Daily

on:
  schedule:
    # Runs at 00:30 UTC (6:00 AM IST) every single day
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the bot anytime via GitHub UI

jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone repository code onto the runner server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up the Python runtime environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install all dependencies (requests + beautifulsoup4)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run the original Weather & Quote summary bot
    - name: Execute Pulse Summary Bot
      run: python bot.py

    # Step 5: Save generated file as a downloadable workflow artifact
    - name: Upload Daily Summary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-summary-artifact
        path: daily_summary.txt

    # Step 6: Run the News Scraper Bot and Email it to your Inbox
    - name: Execute News Scraper and Send Email
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      run: python news_bot.py